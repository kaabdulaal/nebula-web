name: Web Docker Build
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build . --file Dockerfile --tag nebula-web:latest

      - name: Test Container Config
        run: |
          docker run --rm nebula-web:latest node --version
